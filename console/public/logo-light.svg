<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 770 132" width="770" height="132">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="wingGrad2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: butterfly wings + star + network nodes -->
  <g transform="translate(0, 4) scale(0.92)">
    <!-- Left wing -->
    <path d="M61,62 C50,40 20,28 17,55 C15,72 38,82 61,62Z" fill="url(#wingGrad)" opacity="0.9"/>
    <path d="M61,62 C53,48 30,38 28,58 C26,70 42,78 61,62Z" fill="url(#wingGrad)" opacity="0.5"/>
    <!-- Right wing -->
    <path d="M61,62 C72,40 102,28 105,55 C107,72 84,82 61,62Z" fill="url(#wingGrad2)" opacity="0.9"/>
    <path d="M61,62 C69,48 92,38 94,58 C96,70 80,78 61,62Z" fill="url(#wingGrad2)" opacity="0.5"/>
    <!-- Left lower wing -->
    <path d="M61,65 C47,80 25,88 28,75 C30,65 47,70 61,65Z" fill="url(#wingGrad)" opacity="0.7"/>
    <!-- Right lower wing -->
    <path d="M61,65 C75,80 97,88 94,75 C92,65 75,70 61,65Z" fill="url(#wingGrad2)" opacity="0.7"/>
    <!-- Central star -->
    <polygon points="61,40 64.5,49 73,49 66.5,54 68.5,63 61,58 53.5,63 55.5,54 49,49 57.5,49"
             fill="url(#starGrad)" filter="url(#glow)"/>
    <!-- Node dots -->
    <circle cx="35" cy="48" r="1.8" fill="#A78BFA" opacity="0.8"/>
    <circle cx="44" cy="42" r="1.5" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="28" cy="60" r="1.2" fill="#6366F1" opacity="0.6"/>
    <circle cx="40" cy="70" r="1.5" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="87" cy="48" r="1.8" fill="#A78BFA" opacity="0.8"/>
    <circle cx="78" cy="42" r="1.5" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="94" cy="60" r="1.2" fill="#6366F1" opacity="0.6"/>
    <circle cx="82" cy="70" r="1.5" fill="#8B5CF6" opacity="0.7"/>
    <!-- Connection lines -->
    <line x1="35" y1="48" x2="44" y2="42" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>
    <line x1="44" y1="42" x2="40" y2="70" stroke="#8B5CF6" stroke-width="0.5" opacity="0.3"/>
    <line x1="87" y1="48" x2="78" y2="42" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>
    <line x1="78" y1="42" x2="82" y2="70" stroke="#8B5CF6" stroke-width="0.5" opacity="0.3"/>
    <!-- Center body -->
    <ellipse cx="61" cy="62" rx="2.5" ry="9" fill="#4F46E5"/>
  </g>

  <!-- Text: 星智 StarMind (light background version = dark text) -->
  <text x="130" y="60" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="700" fill="#1E1B4B">星智</text>
  <text x="130" y="95" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="600" fill="#4F46E5" letter-spacing="2">StarMind</text>

  <!-- Subtle tagline -->
  <text x="330" y="95" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="400" fill="#6366F1" opacity="0.6">ERP Assistant</text>
</svg>